<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:#fff;
    width:100%;
    max-width:380px;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    text-align:center;
}

.card img{
    width:100%;
    display:block;
}

.content{
    padding:25px;
}

h1{
    color:#ff2d75;
    margin-bottom:15px;
    font-size:34px;
}

p{
    color:#555;
    font-size:19px;
    line-height:1.8;
}

button{
    margin-top:25px;
    background:#ff2d75;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#ff0f61;
}
</style>

</head>
<body>

<div class="card">

<img src="couple.png" alt="Cute Couple">

<div class="content">

<h1>❤️ I Love You ❤️</h1>

<p>
Happy Birthday, Ma Ma! 🎂🎉<br><br>

You are the most beautiful part of my life.<br>

Thank you for always being with me.<br><br>

I will love you forever. ❤️
</p>

<button onclick="loveMessage()">
💖 Hug Me 💖
</button>

</div>

</div>

<script>
function loveMessage(){
alert("Happy Birthday My Love ❤️\n\nYou are my happiness forever. 🥰");
}
</script>

</body>
</html>
