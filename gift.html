<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9eb5,#ffd6df);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff2d75;
    font-size:36px;
}

p{
    font-size:20px;
    color:#444;
    line-height:1.8;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:#ff2d75;
    color:white;
    font-size:20px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="card">
<h1>❤️ I Love You ❤️</h1>

<p>
Happy Birthday, Ma Ma! 🎂🎉<br><br>

You are the most beautiful part of my life.<br>

Thank you for always being with me.<br><br>

I will love you forever. ❤️
</p>

<button onclick="alert('Happy Birthday My Love ❤️')">
❤️ Hug Me ❤️
</button>
<img src="angry.png" alt="Cute Couple"
style="width:220px; margin-top:20px; border-radius:15px;">
</div>

</body>
</html>
